<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude's Math Marauder</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/opendyslexic" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <canvas id="game-canvas" aria-hidden="true"></canvas>
  <!-- role="status" implies aria-live="polite"; aria-atomic="false" is intentional so sub-updates announce incrementally -->
  <div id="hud-root" role="status" aria-atomic="false"></div>
  <div id="overlay-root"></div>
  <div id="toast-root" role="status"></div>
  <div id="transition-canvas-wrap"><canvas id="transition-canvas"></canvas></div>
  <div id="fps-counter" aria-hidden="true"></div>

  <!-- TITLE screen -->
  <section id="title-screen" class="screen active" aria-label="Title screen">
    <button id="title-settings-btn" class="secondary settings-gear-btn" aria-label="Open settings" aria-expanded="false">⚙️</button>
    <h1>Claude's Math Marauder</h1>
    <p class="subtitle" id="title-subtitle">A game by Claude</p>
    <button id="start-button" class="primary" aria-label="Begin game">Begin</button>
  </section>

  <!-- HUB screen -->
  <section id="hub-screen" class="screen" aria-label="Wizard's Tower">
    <header class="hub-header">
      <div class="hub-title-row">
        <h1 class="hub-title">WIZARD'S TOWER</h1>
        <button id="hub-settings-btn" class="secondary settings-gear-btn" aria-label="Open settings" aria-expanded="false">⚙️</button>
      </div>
      <div class="hub-stats" role="group" aria-label="Stats">
        <div class="hub-stat" id="hub-stat-gold">
          <span class="hub-stat-icon" aria-hidden="true">💰</span>
          <span class="hub-stat-value" aria-label="Gold: 0">0</span>
        </div>
        <div class="hub-stat" id="hub-stat-class">
          <span class="hub-stat-icon" aria-hidden="true">🧙</span>
          <span class="hub-stat-value" aria-label="Class: Apprentice">Apprentice</span>
        </div>
      </div>
    </header>

    <div class="hub-grid" role="group" aria-label="Wizard's Tower actions">
      <button class="hub-tile" id="hub-btn-start-run" aria-label="Start a new run">
        <span class="hub-tile-icon" aria-hidden="true">⚔️</span>
        <span class="hub-tile-title">START RUN</span>
        <span class="hub-tile-sub" id="hub-btn-start-run-sub">Choose a realm</span>
      </button>
      <button class="hub-tile" id="hub-btn-deck" aria-label="Build your spell deck">
        <span class="hub-tile-icon" aria-hidden="true">📜</span>
        <span class="hub-tile-title">DECK</span>
        <span class="hub-tile-sub" id="hub-btn-deck-sub">1 spell equipped</span>
      </button>
      <button class="hub-tile" id="hub-btn-class" aria-label="Pick your wizard class">
        <span class="hub-tile-icon" aria-hidden="true">🎓</span>
        <span class="hub-tile-title">CLASS</span>
        <span class="hub-tile-sub" id="hub-btn-class-sub">1 unlocked</span>
      </button>
      <button class="hub-tile" id="hub-btn-codex" aria-label="View the codex of facts">
        <span class="hub-tile-icon" aria-hidden="true">📖</span>
        <span class="hub-tile-title">CODEX</span>
        <span class="hub-tile-sub" id="hub-btn-codex-sub">0 / 169 mastered</span>
      </button>
      <button class="hub-tile" id="hub-btn-story" aria-label="View story panels">
        <span class="hub-tile-icon" aria-hidden="true">📚</span>
        <span class="hub-tile-title">STORY</span>
        <span class="hub-tile-sub" id="hub-btn-story-sub">0 chapters</span>
      </button>
      <button class="hub-tile" id="hub-btn-fight" aria-label="Quick fight — pick a monster and fight">
        <span class="hub-tile-icon" aria-hidden="true">🏟️</span>
        <span class="hub-tile-title">FIGHT</span>
        <span class="hub-tile-sub">Quick battle</span>
      </button>
    </div>

    <!-- Resume banner — only shown when active run exists; no aria-live (shown on hub enter, not dynamically) -->
    <div id="hub-resume-banner" class="hub-banner hidden">
      <span class="hub-banner-text">A run is in progress.</span>
      <div class="hub-banner-actions">
        <button id="hub-btn-resume" class="primary">Resume</button>
        <button id="hub-btn-abandon" class="secondary danger">Abandon</button>
      </div>
    </div>
  </section>

  <!-- RUN MAP screen — populated by mapScreen.js -->
  <section id="run-map-screen" class="screen" aria-label="Run map"></section>

  <!-- FIGHT screen — populated by fight.js / bossFight.js -->
  <section id="fight-screen" class="screen" aria-label="Combat"></section>

  <!-- RESULTS screen — populated by resultsCard.js -->
  <section id="results-screen" class="screen" aria-label="Results"></section>

  <!-- PAUSED screen -->
  <section id="paused-screen" class="screen" aria-label="Game paused">
    <h2>Paused</h2>
    <button id="resume-button" class="primary" aria-label="Resume game">Resume</button>
  </section>

  <!-- DEMO screen — visible at ?demo=1; canvas renders all content; buttons are DOM overlays -->
  <section id="demo-screen" class="screen" aria-label="Render demo">
    <div id="demo-controls" aria-label="Demo controls">
      <button id="demo-flash-toggle" class="secondary" aria-pressed="false" aria-label="Toggle panel flash">Flash</button>
      <button id="demo-shake-toggle" class="secondary" aria-label="Trigger screen shake">Shake</button>
      <button id="demo-hit-0" class="secondary" aria-label="Hit goblin">Hit Goblin</button>
      <button id="demo-hit-1" class="secondary" aria-label="Hit dragon">Hit Dragon</button>
      <button id="demo-hit-2" class="secondary" aria-label="Hit lich">Hit Lich</button>
    </div>
  </section>

  <!--
    Script load order (all defer, UMD globals — no bundler required):
      1. Utilities: save, rng, shuffle, escape, toast
      2. Combat logic (pure, no DOM): factKeys → mastery → problemGen → distractors
      3. FX system: cache → comicfx → shapes → animation → particles → renderers
      4. Game orchestration: game.js last (reads all globals)
  -->
  <script src="js/save.js" defer></script>
  <script src="js/util/rng.js" defer></script>
  <script src="js/util/shuffle.js" defer></script>
  <script src="js/util/escape.js" defer></script>
  <script src="js/ui/toast.js" defer></script>
  <!-- Combat modules (Sessions 1–2) -->
  <script src="js/combat/factKeys.js" defer></script>
  <script src="js/combat/mastery.js" defer></script>
  <script src="js/combat/problemGen.js" defer></script>
  <script src="js/combat/distractors.js" defer></script>
  <!-- FX system (Session 3) -->
  <script src="js/fx/cache.js" defer></script>
  <script src="js/fx/comicfx.js" defer></script>
  <script src="js/fx/shapes.js" defer></script>
  <script src="js/fx/animation.js" defer></script>
  <script src="js/fx/particles.js" defer></script>
  <script src="js/fx/monsterRenderer.js" defer></script>
  <script src="js/fx/wizardRenderer.js" defer></script>
  <!-- Combat + UI (Sessions 5–7) -->
  <script src="js/combat/ultimate.js" defer></script>
  <script src="js/combat/fight.js" defer></script>
  <script src="js/combat/bossFight.js" defer></script>
  <script src="js/combat/orbs.js" defer></script>
  <script src="js/ui/hud.js" defer></script>
  <!-- Hub overlays (Session 10) -->
  <script src="js/hub/deckBuilder.js" defer></script>
  <script src="js/hub/classPicker.js" defer></script>
  <script src="js/hub/codex.js" defer></script>
  <script src="js/hub/story.js" defer></script>
  <script src="js/hub/realmPicker.js" defer></script>
  <script src="js/hub/quickFight.js" defer></script>
  <script src="js/hub/hub.js" defer></script>
  <!-- Audio + Settings (Session 8) -->
  <script src="js/audio/sfx.js" defer></script>
  <script src="js/audio/speech.js" defer></script>
  <script src="js/ui/settings.js" defer></script>
  <!-- Run map system (Session 9) -->
  <script src="js/run/mapGen.js" defer></script>
  <script src="js/run/runtime.js" defer></script>
  <script src="js/run/mapScreen.js" defer></script>
  <script src="js/run/events.js" defer></script>
  <script src="js/run/shop.js" defer></script>
  <!-- Game orchestration -->
  <script src="js/game.js" defer></script>
</body>
</html>
